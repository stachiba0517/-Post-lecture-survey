# GitHub Pages（GitHub Actions ソース）へ Vite の dist をデプロイする
#
# 【必須・404 対策】初回および設定変更時:
#   https://github.com/stachiba0517/-Post-lecture-survey/settings/pages
#   → Build and deployment → Source を「GitHub Actions」にする
#   （Deploy from a branch のままだと deploy が 404 になる）
#
# Secrets: Settings → Secrets and variables → Actions
#   VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY
#
# 初回デプロイで「github-pages 環境の承認」を求められたら Actions 画面で承認する

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build:gh-pages
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: /-Post-lecture-survey/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
